<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoKeMoN</title>
    <link rel="stylesheet" href="style.css" />
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
  </head>
  <body>
    <main>
      <header>
        <div class="menu"><i class="ri-menu-line icons"></i></div>

        <div class="logo"><img height="200px" src="https://www.freepnglogos.com/uploads/pokemon-logo-text-png-7.png" alt=""></div>

        <div class="theme"><i class="ri-sun-line icons"></i></div>
      </header>

      <section>
        <div class="div1">
            <div class="search">
                <i class="ri-search-2-line"></i>
                <label for="search">Search for a Pokémon</label>
                <input class="search-input" type="search">
            </div>
            <div class="filter">
               <h3>Filter by types (1)</h3>
               <i class="ri-arrow-down-s-line"></i>
                <!-- <i class="ri-skip-down-line"></i> -->
            </div>
            
        </div>
      </section>
    </main>
  </body>
</html>
